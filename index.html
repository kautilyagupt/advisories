<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="game-panel">
      <h1>Tic Tac Toe</h1>
      <p class="status">Mode: <span id="mode-label">Single Player</span></p>
      <div class="mode-switch" role="tablist" aria-label="Game mode">
        <button class="mode-btn active" data-mode="single">Single Player</button>
        <button class="mode-btn" data-mode="two">Two Player</button>
      </div>
      <p class="status">Status: <span id="current-player">Your turn</span></p>
      <div class="board" id="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      </div>
      <div class="controls">
        <button id="restart">Restart Game</button>
      </div>
      <p class="instructions">Play as X against a perfect AI. The computer makes the strongest possible move.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
