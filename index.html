<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contra</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="game-panel">
      <h1>Contra</h1>
      <p class="status">Score: <span id="score">0</span></p>
      <p class="status">Health: <span id="health">3</span></p>
      <div id="game-screen" class="game-screen"></div>
      <div class="controls">
        <button id="restart">Restart</button>
      </div>
      <p class="instructions">Use arrow keys to move, X to jump, Z to shoot. Survive waves of enemies in this Contra-style shooter.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
